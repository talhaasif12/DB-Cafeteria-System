<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Cafeteria Management System" }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body { background: #f7f8fb; }
      .navbar-brand { font-weight: 700; }
      .card { border: 0; box-shadow: 0 8px 18px rgba(0,0,0,.06); }
      .table thead th { font-size: .85rem; text-transform: uppercase; letter-spacing: .04em; color: #4b5563; }
      .badge-soft { padding: .45rem .6rem; border-radius: 999px; font-weight: 600; }
      .badge-pending { background: rgba(245,158,11,.15); color: #92400e; }
      .badge-completed { background: rgba(34,197,94,.16); color: #166534; }
      .badge-cancelled { background: rgba(239,68,68,.14); color: #7f1d1d; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('dashboard') }}">Cafeteria</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('menu') }}">Menu</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('order') }}">Place Order</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('orders') }}">Orders</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('inventory') }}">Inventory</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('feedback') }}">Feedback</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mb-3">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} mb-2" role="alert">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
