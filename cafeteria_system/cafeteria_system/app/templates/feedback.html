{% extends "base.html" %}
{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="mb-0">Feedback</h3>
      <div class="text-muted">Submit feedback for a completed order</div>
    </div>
  </div>

  <form method="post" class="card">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Completed Order (no feedback yet)</label>
          <select class="form-select" name="order_id" required>
            <option value="" selected disabled>Select order...</option>
            {% for oid, cname, total in eligible_orders %}
              <option value="{{ oid }}">#{{ oid }} — {{ cname }} (Rs. {{ "%.0f"|format(total) }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Rating</label>
          <select class="form-select" name="rating" required>
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>
        </div>
        <div class="col-md-12">
          <label class="form-label">Comments</label>
          <textarea class="form-control" name="comments" rows="4" placeholder="Write your feedback..."></textarea>
        </div>
      </div>

      <div class="d-flex justify-content-end mt-3">
        <button class="btn btn-primary" type="submit">Submit Feedback</button>
      </div>
    </div>
  </form>
{% endblock %}
